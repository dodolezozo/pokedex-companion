<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Guide Progression</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <div class="header-left">
    <h1 id="site-title">Pokémon Guide Progression</h1>
    <p id="site-subtitle">Cobblemon Tycoon</p>
  </div>
  <div class="lang-switcher" id="lang-switcher"></div>
</header>

<main>

  <!-- Sélecteur de jeu -->
  <div class="game-selector" id="game-selector"></div>

  <!-- Placeholder avant sélection -->
  <div class="placeholder" id="placeholder">
    🎮 Sélectionne un jeu pour commencer
  </div>

  <!-- Contenu principal (caché jusqu'à sélection d'un jeu) -->
  <div id="main-content" style="display:none">

    <!-- Barre de progression -->
    <div class="progress-wrap">
      <div class="progress-track" id="progress-track"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label" id="label-available">Disponibles</div>
        <div class="stat-value green" id="stat-available">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" id="label-locked">En attente</div>
        <div class="stat-value amber" id="stat-locked">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" id="label-total">Total</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
    </div>

    <!-- Pokémon disponibles -->
    <div class="section-title" id="sec-available"></div>
    <div class="pokemon-grid" id="grid-available"></div>

    <!-- Séparateur -->
    <div class="divider" id="divider" style="display:none"></div>

    <!-- Pokémon verrouillés -->
    <div class="section-title" id="sec-locked"></div>
    <div class="pokemon-grid" id="grid-locked"></div>

  </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
