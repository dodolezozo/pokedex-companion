<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Guide</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <div class="header-left">
    <h1 id="site-title">Pokédex Companion</h1>
  </div>
  <div class="header-right">
    <div class="lang-switcher" id="lang-switcher"></div>
    <a href="https://ko-fi.com/dodolezozo" target="_blank" rel="noopener" class="header-btn kofi-btn">
      ☕ Ko-fi
    </a>
    <a href="https://github.com/dodolezozo/pokedex-companion" target="_blank" rel="noopener" class="header-btn github-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
  </div>
</header>

<main>

  <div class="game-selector" id="game-selector"></div>

  <div class="placeholder" id="placeholder">🎮 <span id="placeholder-text"></span></div>

  <div id="main-content" style="display:none">

    <div class="version-filter" id="version-filter" style="display:none">
      <span class="version-filter-label" id="version-filter-label"></span>
    </div>

    <div class="progress-wrap">
      <div class="progress-track" id="progress-track"></div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label" id="label-available"></div>
        <div class="stat-value green" id="stat-available">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" id="label-locked"></div>
        <div class="stat-value amber" id="stat-locked">—</div>
      </div>
      <div class="stat-card" style="display:flex; flex-direction:column; position:relative;">
        <div class="stat-label" id="label-captured"></div>
        <div class="stat-value pink" id="stat-captured">—</div>
        <button class="reset-btn" id="reset-btn" onclick="confirmReset()">↺ Reset</button>
      </div>
    </div>

    <div class="section-title" id="sec-available"></div>
    <div class="pokemon-grid" id="grid-available"></div>

    <div class="divider" id="divider" style="display:none"></div>

    <div class="section-title" id="sec-locked"></div>
    <div class="pokemon-grid" id="grid-locked"></div>

  </div>
</main>

<script src="js/app.js"></script>
<script>
function confirmReset() {
  if (confirm(state.ui.resetConfirm ?? 'Reset?')) resetCaptured();
}
</script>
</body>
</html>
